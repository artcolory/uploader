<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bride Photo/Video Uploader</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Raleway', sans-serif; background-color: #000; color: #fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .container { text-align:center; max-width:480px; width:90%; padding:40px 30px; }
    h1 { font-family: 'Playfair Display', serif; font-size:2rem; margin-bottom:25px; }
    input, button { font-size:1rem; margin:5px 0; padding:10px; border-radius:8px; border:none; }
    button { cursor:pointer; background:#444; color:#fff; border:2px solid #fff; }
    button:hover { background:#666; }
    #preview img, #preview video { max-width:200px; border-radius:12px; margin-top:10px; }
    #status { margin-top:20px; font-family:'Playfair Display', serif; font-size:1.1rem; font-weight:600; }
    small { display:block; margin-bottom:10px; color:#ccc; font-size:0.9rem; }
  </style>
</head>
<body>

<div class="container">
  <h1>Bride Photo/Video Uploader</h1>

  <!-- Bride enters names and wedding date to create unique ID -->
  <input type="text" id="brideId" placeholder="Enter your names and wedding date (e.g., AliceAndBob_042026)" />
  <small>Use your first names and wedding date to create a unique folder for your photos/videos.</small>

  <!-- File chooser -->
  <input type="file" id="fileInput" accept="image/*,video/*">
  <br>

  <!-- Preview -->
  <div id="preview"></div>

  <!-- Upload button -->
  <button id="uploadBtn">Upload</button>

  <!-- Status -->
  <div id="status"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby22tI-7iO5Qb78tegrBWOm0BiOO2y6C_FsC6v1qWgc6eZVDItJPd23yVwTA8It-ZS2KQ/exec";

const brideInput = document.getElementById("brideId");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const uploadBtn = document.getElementById("uploadBtn");
const status = document.getElementById("status");

// Preview selected file
fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if (!file) { preview.innerHTML=""; return; }
  const url = URL.createObjectURL(file);
  preview.innerHTML = file.type.startsWith("image/") ? `<img src="${url}">` : `<video src="${url}" muted autoplay loop></video>`;
});

// Upload file
uploadBtn.addEventListener("click", () => {
  const brideId = brideInput.value.trim();
  const file = fileInput.files[0];

  if (!brideId) { status.textContent = "Please enter your names and wedding date"; return; }
  if (!file) { status.textContent = "Please select a file"; return; }

  uploadBtn.disabled = true;
  uploadBtn.textContent = "Uploading...";

  const reader = new FileReader();
  reader.onload = function(e) {
    const base64 = e.target.result.split(",")[1];

    fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        fileName: file.name,
        mimeType: file.type,
        base64File: base64,
        brideId: brideId
      })
    })
    .then(res => res.json())
    .then(data => {
      if (data.status === "success") {
        fileInput.value = "";
        preview.innerHTML = "";
        status.textContent = "Upload successful! Thank you.";
      } else {
        status.textContent = `Upload failed: ${data.message}`;
      }
    })
    .catch(err => {
      status.textContent = `Upload failed: ${err}`;
    })
    .finally(() => {
      uploadBtn.disabled = false;
      uploadBtn.textContent = "Upload";
    });
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
